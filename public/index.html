<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caricature Studio</title>
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="page-title">
        <div class="intro">
          <h1 id="page-title" class="eyebrow">Caricature Studio</h1>
          <p class="summary">Upload a portrait, choose a generator and style, then download the result.</p>
        </div>

        <form id="caricature-form" class="panel">
          <label class="upload-area" for="image">
            <span class="upload-title">Choose image</span>
            <span id="file-name" class="upload-meta">JPEG, PNG, or WebP up to 10 MB</span>
            <input id="image" name="image" type="file" accept="image/jpeg,image/png,image/webp" required>
          </label>

          <fieldset class="providers">
            <legend>Provider</legend>
            <div id="provider-options" class="segmented"></div>
          </fieldset>

          <fieldset class="styles">
            <label class="field-label" for="style-select">Style</label>
            <select id="style-select" name="style" disabled></select>
            <p id="style-description" class="style-description">Loading styles...</p>
          </fieldset>

          <button id="generate-button" type="submit" disabled>Generate</button>
          <p id="status" class="status" role="status" aria-live="polite"></p>
        </form>

        <section class="result" aria-label="Generated caricature">
          <div id="placeholder" class="placeholder">Your generated caricature will appear here.</div>
          <img id="result-image" alt="Generated caricature preview" hidden>
          <a id="download-link" class="download" download="caricature.png" hidden>Download PNG</a>
        </section>
      </section>
    </main>
  </body>
</html>
